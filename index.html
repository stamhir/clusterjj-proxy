<!DOCTYPE html>
<html>
<head>
<title>My AI App</title>
<style>
body {
margin: 0;
font-family: Arial, sans-serif;
background: #111;
color: white;
display: flex;
justify-content: center;
align-items: center;
height: 100vh;
flex-direction: column;
}

button {
padding: 14px 24px;
border: none;
border-radius: 8px;
background: #4f46e5;
color: white;
font-size: 16px;
cursor: pointer;
}
</style>
</head>
<body>

<h1>Welcome to My AI App</h1>
<button onclick="openApp()">Launch App</button>

<script>
async function openApp() {
const response = await fetch('/.netlify/functions/proxy');
const data = await response.json();

window.location.href = data.url;
}
</script>

</body>
</html>
